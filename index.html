<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>MUNDIAL 26 · Figurinhas Oficiais Copa 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Archivo:ital,wght@0,400;0,500;0,600;0,700;0,800;0,900;1,600;1,800&family=Archivo+Expanded:wght@600;700;800;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
<style>
/* ============================================================
   MUNDIAL 26 — Sistema visual v2 "MATCHDAY" (dark / agressivo)
   ============================================================ */
:root{
  /* Base escura — estádio à noite */
  --bg:#0A0B0E;
  --bg-2:#0E1014;
  --panel:#15171E;
  --panel-2:#1C1F28;
  --panel-3:#262A35;
  --hair:rgba(255,255,255,.09);
  --hair-2:rgba(255,255,255,.16);

  /* Acentos disciplinados: vermelho elétrico + dourado troféu */
  --red:#FF2E1F; --red-deep:#C7150A; --red-glow:rgba(255,46,31,.45);
  --gold:#F4C24B; --gold-deep:#D29A1E;
  --blue:#3B8DFF; --blue-deep:#1F6FE0;
  --green:#19C37D; --green-deep:#41DA92;

  /* Aliases legados (usados em estilos inline do JSX) remapeados p/ dark */
  --pink:#FF2E1F; --pink-deep:#C7150A;
  --orange:#FF7A33; --orange-deep:#D14700;
  --violet:#8A4DFF; --violet-deep:#5E1FD1;
  --ink:#F4F3ED;          /* emphasis / texto claro */
  --ink-soft:#C7C6C0;     /* corpo */
  --muted:#878A96;        /* secundário */
  --paper:#0A0B0E;        /* (inputs) */
  --paper-2:#1C1F28;      /* (chips) */
  --line:rgba(255,255,255,.09);

  --shadow-sm:0 2px 12px rgba(0,0,0,.5);
  --shadow:0 22px 50px -18px rgba(0,0,0,.7);
  --shadow-lg:0 40px 90px -24px rgba(0,0,0,.85);

  --r-xs:3px; --r-sm:5px; --r:8px; --r-lg:12px; --r-xl:16px;

  --font-display:"Anton",sans-serif;
  --font-exp:"Archivo Expanded","Archivo",sans-serif;
  --font:"Archivo",system-ui,sans-serif;
  --mono:"Space Mono",ui-monospace,monospace;

  --maxw:1280px;
}

*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  font-family:var(--font);
  background:var(--bg);
  color:var(--ink-soft);
  -webkit-font-smoothing:antialiased;
  text-rendering:optimizeLegibility;
  overflow-x:hidden;
  background-image:
    radial-gradient(120% 60% at 50% -10%,rgba(255,46,31,.10),transparent 60%),
    radial-gradient(90% 50% at 100% 0%,rgba(59,141,255,.06),transparent 55%);
  background-attachment:fixed;
}
img{display:block;max-width:100%;}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;}
a{color:inherit;text-decoration:none;}
input,select,textarea{font-family:inherit;font-size:1rem;}
::selection{background:var(--red);color:#fff;}

h1,h2,h3,h4{margin:0;line-height:.95;color:var(--ink);}
.display{font-family:var(--font-display);text-transform:uppercase;letter-spacing:.01em;font-weight:400;}
.exp{font-family:var(--font-exp);}
.mono{font-family:var(--mono);}
p{margin:0;line-height:1.5;}

.wrap{max-width:var(--maxw);margin:0 auto;padding:0 28px;}
.sr-only{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0);}

#root{min-height:100vh;display:flex;flex-direction:column;}
.app-main{flex:1;}

/* ============================================================
   MARQUEE
   ============================================================ */
.marquee{
  background:var(--red);color:#fff;overflow:hidden;white-space:nowrap;
  border-bottom:1px solid rgba(0,0,0,.3);position:relative;z-index:1;
}
.marquee-track{display:inline-flex;gap:0;animation:marq 30s linear infinite;}
.marquee:hover .marquee-track{animation-play-state:paused;}
.marquee-track span{
  display:inline-flex;align-items:center;gap:13px;padding:8px 22px;
  font-family:var(--font-exp);font-weight:800;font-size:.7rem;letter-spacing:.18em;text-transform:uppercase;
}
.marquee-track .dot{width:6px;height:6px;background:#fff;rotate:45deg;}
@keyframes marq{to{transform:translateX(-50%);}}

/* ============================================================
   HEADER
   ============================================================ */
.header{
  position:sticky;top:0;z-index:60;background:rgba(10,11,14,.82);
  backdrop-filter:blur(16px) saturate(1.2);-webkit-backdrop-filter:blur(16px) saturate(1.2);
  border-bottom:1px solid var(--hair);
}
.header-row{display:flex;align-items:center;gap:26px;height:74px;}
.logo{display:flex;align-items:center;gap:12px;flex-shrink:0;}
.logo-mark{
  width:44px;height:44px;flex-shrink:0;position:relative;overflow:hidden;
  background:#000;border:1.5px solid var(--gold);
  display:grid;place-items:center;clip-path:polygon(0 0,100% 0,100% 72%,82% 100%,0 100%);
}
.logo-mark::before{content:"";position:absolute;inset:0;background:linear-gradient(135deg,var(--red),transparent 60%);opacity:.85;}
.logo-mark::after{
  content:"26";font-family:var(--font-display);color:#fff;font-size:1.18rem;position:relative;z-index:1;
  text-shadow:0 1px 0 rgba(0,0,0,.5);
}
.logo-txt{display:flex;flex-direction:column;line-height:1;}
.logo-txt b{font-family:var(--font-display);font-size:1.4rem;letter-spacing:.02em;color:var(--ink);}
.logo-txt small{font-family:var(--mono);font-size:.54rem;letter-spacing:.26em;text-transform:uppercase;color:var(--gold);margin-top:4px;}
.nav{display:flex;gap:2px;margin-left:10px;}
.nav a{
  padding:9px 14px;font-weight:700;font-size:.86rem;color:var(--ink-soft);letter-spacing:.01em;
  text-transform:uppercase;font-size:.78rem;font-family:var(--font-exp);
  transition:color .15s;position:relative;
}
.nav a::after{content:"";position:absolute;left:14px;right:14px;bottom:4px;height:2px;background:var(--red);transform:scaleX(0);transform-origin:left;transition:transform .2s;}
.nav a:hover{color:var(--ink);}
.nav a:hover::after{transform:scaleX(1);}
.header-actions{margin-left:auto;display:flex;align-items:center;gap:10px;}
.cart-btn{
  display:flex;align-items:center;gap:9px;padding:11px 18px;border-radius:var(--r-sm);
  background:var(--red);color:#fff;font-weight:800;font-size:.78rem;position:relative;
  font-family:var(--font-exp);text-transform:uppercase;letter-spacing:.06em;
  transition:transform .12s,box-shadow .2s;box-shadow:0 8px 22px -10px var(--red-glow);
}
.cart-btn:hover{transform:translateY(-1px);box-shadow:0 14px 30px -10px var(--red-glow);}
.cart-btn:active{transform:translateY(0);}
.cart-count{
  background:#fff;color:var(--red);min-width:20px;height:20px;border-radius:4px;
  display:grid;place-items:center;font-size:.72rem;font-weight:900;padding:0 5px;
}
.menu-toggle{display:none;width:46px;height:46px;border-radius:var(--r-sm);background:var(--panel-2);border:1px solid var(--hair);align-items:center;justify-content:center;color:var(--ink);}
.menu-toggle svg{width:22px;height:22px;}

/* ============================================================
   BUTTONS
   ============================================================ */
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:9px;
  font-family:var(--font-exp);font-weight:800;font-size:.86rem;letter-spacing:.05em;text-transform:uppercase;
  padding:15px 26px;border-radius:var(--r-sm);transition:transform .12s,box-shadow .2s,filter .2s,background .2s;
  white-space:nowrap;
}
.btn:active{transform:translateY(1px);}
.btn-pink{background:var(--red);color:#fff;box-shadow:0 12px 30px -12px var(--red-glow);}
.btn-pink:hover{filter:brightness(1.08);box-shadow:0 18px 40px -12px var(--red-glow);transform:translateY(-2px);}
.btn-ink{background:transparent;color:var(--ink);border:1.5px solid var(--hair-2);}
.btn-ink:hover{background:var(--ink);color:var(--bg);border-color:var(--ink);transform:translateY(-2px);}
.btn-gold{background:var(--gold);color:#161200;box-shadow:0 12px 30px -12px rgba(244,194,75,.5);}
.btn-gold:hover{filter:brightness(1.06);transform:translateY(-2px);}
.btn-ghost{background:transparent;color:var(--ink);border:1.5px solid var(--hair-2);}
.btn-ghost:hover{background:var(--ink);color:var(--bg);border-color:var(--ink);}
.btn-block{width:100%;}
.btn-lg{padding:18px 32px;font-size:.95rem;}
.btn-sm{padding:11px 18px;font-size:.74rem;}
.btn[disabled]{opacity:.4;pointer-events:none;}

/* ============================================================
   HERO
   ============================================================ */
.hero{position:relative;overflow:hidden;background:var(--bg);color:#fff;border-bottom:1px solid var(--hair);}
.hero::before{
  content:"";position:absolute;inset:0;pointer-events:none;
  background:
    radial-gradient(55% 75% at 80% 12%,rgba(255,46,31,.30),transparent 58%),
    radial-gradient(50% 70% at 8% 90%,rgba(59,141,255,.16),transparent 60%),
    radial-gradient(40% 60% at 95% 95%,rgba(244,194,75,.14),transparent 55%);
}
.hero::after{ /* watermark gigante "26" */
  content:"26";position:absolute;right:-4%;bottom:-22%;font-family:var(--font-display);
  font-size:46vw;line-height:.7;color:rgba(255,255,255,.025);pointer-events:none;z-index:0;
}
.hero-inner{position:relative;z-index:1;display:grid;grid-template-columns:1.08fr .92fr;gap:40px;align-items:center;padding:72px 0 84px;}
.hero-kicker{display:inline-flex;align-items:center;gap:11px;font-family:var(--mono);font-size:.68rem;letter-spacing:.24em;text-transform:uppercase;color:#fff;background:rgba(255,255,255,.06);border:1px solid var(--hair-2);padding:9px 15px;border-radius:var(--r-sm);margin-bottom:26px;}
.flag-dots{display:inline-flex;gap:5px;}
.flag-dots i{width:8px;height:8px;display:block;}
.hero h1{font-family:var(--font-display);text-transform:uppercase;font-size:clamp(3.4rem,7.6vw,6.6rem);line-height:.84;letter-spacing:.004em;color:#fff;}
.hero h1 .out{-webkit-text-stroke:2px rgba(255,255,255,.85);color:transparent;}
.hero h1 .grad{
  background:linear-gradient(96deg,var(--gold),var(--red) 70%);
  -webkit-background-clip:text;background-clip:text;color:transparent;
}
.hero-sub{font-size:1.12rem;color:rgba(255,255,255,.74);max-width:34ch;margin:26px 0 34px;line-height:1.5;}
.hero-cta{display:flex;gap:13px;flex-wrap:wrap;}
.hero-stats{display:flex;gap:0;margin-top:42px;border-top:1px solid var(--hair);padding-top:26px;}
.hero-stats .st{padding-right:34px;margin-right:34px;border-right:1px solid var(--hair);}
.hero-stats .st:last-child{border-right:none;}
.hero-stats .st b{font-family:var(--font-display);font-size:2.1rem;display:block;line-height:1;color:var(--gold);}
.hero-stats .st small{font-size:.72rem;color:rgba(255,255,255,.55);letter-spacing:.05em;text-transform:uppercase;font-family:var(--font-exp);font-weight:700;}

/* Hero art — pacotes em holofote */
.hero-art{position:relative;height:460px;}
.float-pack{position:absolute;border-radius:var(--r);box-shadow:var(--shadow-lg);filter:drop-shadow(0 0 40px rgba(255,46,31,.18));}
.fp1{width:218px;height:290px;left:20%;top:4%;transform:rotate(-7deg);z-index:3;animation:bob 6s ease-in-out infinite;}
.fp2{width:190px;height:252px;left:48%;top:30%;transform:rotate(6deg);z-index:2;animation:bob 7s ease-in-out infinite .6s;}
.fp3{width:150px;height:200px;left:4%;top:50%;transform:rotate(4deg);z-index:1;animation:bob 8s ease-in-out infinite .3s;}
@keyframes bob{0%,100%{translate:0 0;}50%{translate:0 -16px;}}

/* ============================================================
   PACK GRAPHIC
   ============================================================ */
.pack{
  --c:var(--red);--cd:var(--red-deep);
  position:relative;border-radius:var(--r);overflow:hidden;
  background:linear-gradient(160deg,var(--c),var(--cd));
  color:#fff;display:flex;flex-direction:column;isolation:isolate;
}
/* foto real do produto — holofote claro */
.pack.pack-photo{
  background:radial-gradient(120% 100% at 50% 0%,#ffffff,#eef0f4);
  border:1px solid var(--hair);padding:10px;
}
.pack.pack-photo::before,.pack.pack-photo::after{display:none;}
.pack.pack-photo img{width:100%;height:100%;object-fit:contain;border-radius:var(--r-sm);}
.pack::before{content:"";position:absolute;inset:0;z-index:0;mix-blend-mode:overlay;opacity:.5;
  background:repeating-linear-gradient(115deg,rgba(255,255,255,0) 0 18px,rgba(255,255,255,.35) 18px 20px,rgba(255,255,255,0) 22px 40px);}
.pack::after{content:"";position:absolute;top:0;left:0;right:0;height:12px;z-index:2;
  background:radial-gradient(circle at 6px -3px,transparent 6px,var(--bg) 6.5px) repeat-x;background-size:14px 12px;}
.pack-top{display:flex;justify-content:flex-end;align-items:flex-start;padding:18px 16px 0;position:relative;z-index:1;}
.pack-holo{width:34px;height:22px;border-radius:4px;background:conic-gradient(from 0deg,#fff6,#fff0,#fff6,#fff0,#fff6);opacity:.75;}
.pack-body{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;z-index:1;text-align:center;padding:6px 12px;}
.pack-num{font-family:var(--font-display);font-size:clamp(2.4rem,8vw,3.6rem);line-height:.82;text-shadow:0 3px 0 rgba(0,0,0,.18);}
.pack-num.sm{font-size:2.1rem;}
.pack-label{font-family:var(--font-exp);font-weight:800;font-size:.8rem;letter-spacing:.16em;text-transform:uppercase;margin-top:4px;opacity:.95;}
.pack-foot{position:relative;z-index:1;padding:0 16px 16px;display:flex;align-items:center;justify-content:space-between;gap:8px;}
.pack-foot .of{font-family:var(--mono);font-size:.54rem;letter-spacing:.1em;opacity:.85;line-height:1.3;}
.pack-stars{display:flex;gap:3px;}
.pack-stars i{width:6px;height:6px;background:#fff;opacity:.7;border-radius:1px;rotate:45deg;}
.pack.is-album .album-book{width:56%;aspect-ratio:3/4;border-radius:3px 8px 8px 3px;margin:2px auto 12px;
  background:linear-gradient(135deg,#fff,rgba(255,255,255,.78));position:relative;box-shadow:0 16px 28px -12px rgba(0,0,0,.55);border-left:7px solid rgba(0,0,0,.25);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;padding:8px;}
.pack.is-album .album-book .ab-title{font-family:var(--font-display);color:var(--cd);font-size:1.5rem;line-height:.85;}
.pack.is-album .album-book .ab-sub{font-family:var(--font-display);color:var(--c);font-size:1.05rem;line-height:.85;}
.pack.is-album .album-book .ab-tag{font-family:var(--mono);font-size:.5rem;color:var(--cd);letter-spacing:.14em;margin-top:4px;background:rgba(0,0,0,.06);padding:2px 6px;border-radius:3px;}

/* ============================================================
   SECTION HEADERS
   ============================================================ */
.section{padding:84px 0;position:relative;}
.section.alt{background:var(--bg-2);border-top:1px solid var(--hair);border-bottom:1px solid var(--hair);}
.sec-head{display:flex;align-items:flex-end;justify-content:space-between;gap:24px;margin-bottom:42px;flex-wrap:wrap;}
.sec-eyebrow{font-family:var(--mono);font-size:.72rem;letter-spacing:.22em;text-transform:uppercase;color:var(--red);font-weight:700;margin-bottom:16px;display:flex;align-items:center;gap:10px;}
.sec-eyebrow::before{content:"";width:30px;height:2px;background:var(--red);}
.sec-head h2{font-family:var(--font-display);text-transform:uppercase;font-size:clamp(2.3rem,5vw,3.9rem);letter-spacing:.006em;max-width:18ch;color:var(--ink);}
.sec-head p{color:var(--muted);max-width:38ch;font-size:1rem;}

/* ============================================================
   PRODUCT GRID + CARD
   ============================================================ */
.prod-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:18px;}
.prod-grid.cols-3{grid-template-columns:repeat(3,1fr);}
.card{
  background:var(--panel);border-radius:var(--r-lg);border:1px solid var(--hair);
  overflow:hidden;display:flex;flex-direction:column;position:relative;
  transition:transform .18s,box-shadow .25s,border-color .2s;cursor:pointer;
}
.card::before{content:"";position:absolute;top:0;left:0;right:0;height:3px;background:var(--red);transform:scaleX(0);transform-origin:left;transition:transform .25s;z-index:6;}
.card:hover{transform:translateY(-6px);box-shadow:var(--shadow);border-color:var(--hair-2);}
.card:hover::before{transform:scaleX(1);}
.card-media{position:relative;padding:16px 16px 0;}
.card .pack{height:228px;}
.card-badge{
  position:absolute;top:13px;left:13px;z-index:5;font-family:var(--font-exp);font-weight:900;
  font-size:.62rem;letter-spacing:.1em;text-transform:uppercase;color:#fff;white-space:nowrap;
  background:var(--red);padding:6px 11px;border-radius:var(--r-xs);box-shadow:0 6px 16px -6px var(--red-glow);
}
.card-body{padding:18px 20px 22px;display:flex;flex-direction:column;flex:1;}
.card h3{font-family:var(--font-exp);font-weight:800;font-size:1.12rem;letter-spacing:-.01em;color:var(--ink);}
.card-meta{display:flex;gap:8px;flex-wrap:wrap;margin:10px 0 14px;}
.tag{font-size:.66rem;font-weight:800;color:var(--gold);background:rgba(244,194,75,.1);border:1px solid rgba(244,194,75,.25);padding:5px 9px;border-radius:var(--r-xs);display:inline-flex;align-items:center;gap:5px;text-transform:uppercase;letter-spacing:.06em;}
.card-price{display:flex;align-items:baseline;gap:8px;margin-top:auto;flex-wrap:wrap;}
.card-price .now{font-family:var(--font-display);font-size:1.9rem;white-space:nowrap;color:var(--ink);}
.card-price .per{font-size:.74rem;color:var(--muted);font-family:var(--mono);}
.card-foot{display:flex;gap:10px;align-items:center;margin-top:16px;}
.card-add{flex:1;}
.added-flash{position:absolute;inset:0;background:var(--green);color:#04130c;display:flex;align-items:center;justify-content:center;gap:10px;font-family:var(--font-exp);font-weight:900;letter-spacing:.06em;text-transform:uppercase;font-size:.9rem;z-index:20;animation:flashIn .25s ease;}
@keyframes flashIn{from{opacity:0;}to{opacity:1;}}

/* ============================================================
   TRUST STRIP
   ============================================================ */
.trust{background:var(--bg-2);color:#fff;border-top:1px solid var(--hair);border-bottom:1px solid var(--hair);}
.trust-row{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--hair);border-radius:var(--r-lg);overflow:hidden;border:1px solid var(--hair);}
.trust-cell{background:var(--panel);padding:26px 24px;display:flex;gap:14px;align-items:flex-start;transition:background .2s;}
.trust-cell:hover{background:var(--panel-2);}
.trust-cell .ic{width:40px;height:40px;border-radius:var(--r-sm);display:grid;place-items:center;flex-shrink:0;color:#0a0b0e;}
.trust-cell b{font-family:var(--font-exp);font-weight:800;font-size:.98rem;display:block;color:var(--ink);text-transform:uppercase;letter-spacing:.03em;}
.trust-cell small{color:var(--muted);font-size:.82rem;line-height:1.4;display:block;margin-top:4px;}
.trust-cell svg{width:20px;height:20px;}

/* ============================================================
   HOW IT WORKS
   ============================================================ */
.steps{display:grid;grid-template-columns:repeat(3,1fr);gap:18px;}
.step{background:var(--panel);border:1px solid var(--hair);border-radius:var(--r-lg);padding:32px 28px;position:relative;overflow:hidden;}
.step-n{font-family:var(--font-display);font-size:4.4rem;line-height:.7;color:rgba(255,255,255,.05);position:absolute;top:18px;right:20px;}
.step .ic{width:48px;height:48px;border-radius:var(--r-sm);display:grid;place-items:center;margin-bottom:20px;color:#0a0b0e;}
.step h4{font-family:var(--font-exp);font-weight:800;font-size:1.18rem;margin-bottom:9px;color:var(--ink);text-transform:uppercase;letter-spacing:.02em;}
.step p{color:var(--muted);font-size:.95rem;}

/* ============================================================
   FOOTER
   ============================================================ */
.footer{background:var(--bg-2);color:#fff;padding:64px 0 32px;border-top:1px solid var(--hair);}
.footer-top{display:grid;grid-template-columns:1.5fr 1fr 1fr 1fr;gap:30px;padding-bottom:42px;border-bottom:1px solid var(--hair);}
.footer h5{font-family:var(--font-exp);font-weight:800;font-size:.74rem;letter-spacing:.16em;text-transform:uppercase;color:var(--gold);margin-bottom:18px;}
.footer ul{list-style:none;margin:0;padding:0;display:flex;flex-direction:column;gap:11px;}
.footer ul a{color:var(--ink-soft);font-size:.92rem;transition:color .15s;}
.footer ul a:hover{color:#fff;}
.footer-brand p{color:var(--muted);font-size:.9rem;max-width:34ch;margin-top:18px;line-height:1.6;}
.footer-bottom{display:flex;justify-content:space-between;gap:20px;padding-top:26px;flex-wrap:wrap;align-items:center;}
.footer-bottom small{color:rgba(255,255,255,.4);font-size:.76rem;line-height:1.6;}
.pay-badges{display:flex;gap:8px;align-items:center;}
.pay-badges span{font-family:var(--mono);font-size:.6rem;letter-spacing:.08em;background:var(--panel-2);border:1px solid var(--hair);padding:6px 10px;border-radius:var(--r-xs);color:var(--ink-soft);}

/* ============================================================
   PRODUCT DETAIL
   ============================================================ */
.pd{padding:36px 0 90px;}
.breadcrumb{display:flex;gap:8px;align-items:center;font-size:.82rem;color:var(--muted);margin-bottom:28px;font-family:var(--mono);}
.breadcrumb a:hover{color:var(--ink);}
.breadcrumb .sep{opacity:.4;}
.pd-grid{display:grid;grid-template-columns:1fr 1fr;gap:52px;align-items:start;}
.pd-gallery{position:sticky;top:100px;}
.pd-hero-pack{height:500px;border-radius:var(--r-xl);}
.pd-thumbs{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:12px;}
.pd-thumb{aspect-ratio:1;border-radius:var(--r-sm);border:1px solid var(--hair);overflow:hidden;background:var(--panel-2);position:relative;}
.ph{position:absolute;inset:0;background:repeating-linear-gradient(45deg,var(--panel-2) 0 10px,var(--panel-3) 10px 20px);display:flex;align-items:center;justify-content:center;}
.ph small{font-family:var(--mono);font-size:.54rem;letter-spacing:.06em;color:var(--muted);text-align:center;padding:6px;}
.pd-info h1{font-family:var(--font-display);text-transform:uppercase;font-size:clamp(2.5rem,4.6vw,3.6rem);letter-spacing:.006em;line-height:.88;color:var(--ink);}
.pd-rating{display:flex;align-items:center;gap:10px;margin:16px 0 20px;font-size:.88rem;color:var(--muted);font-family:var(--mono);}
.stars{display:flex;gap:2px;color:var(--gold);}
.stars svg{width:17px;height:17px;}
.pd-blurb{font-size:1.08rem;color:var(--ink-soft);line-height:1.6;max-width:46ch;}
.pd-price-row{display:flex;align-items:baseline;gap:14px;margin:26px 0 6px;}
.pd-price{font-family:var(--font-display);font-size:3.2rem;line-height:1;color:var(--ink);}
.pd-per{font-size:.9rem;color:var(--muted);font-family:var(--mono);}
.pd-installments{font-size:.92rem;color:var(--green-deep);font-weight:700;margin-bottom:26px;}
.pd-features{list-style:none;margin:26px 0;padding:24px 0;border-top:1px solid var(--hair);border-bottom:1px solid var(--hair);display:grid;grid-template-columns:1fr 1fr;gap:15px;}
.pd-features li{display:flex;gap:10px;align-items:flex-start;font-size:.92rem;color:var(--ink-soft);}
.pd-features svg{width:18px;height:18px;color:var(--green-deep);flex-shrink:0;margin-top:1px;}
.qty{display:inline-flex;align-items:center;border:1.5px solid var(--hair-2);border-radius:var(--r-sm);overflow:hidden;}
.qty button{width:46px;height:48px;font-size:1.3rem;font-weight:700;display:grid;place-items:center;transition:background .15s;color:var(--ink);}
.qty button:hover{background:var(--panel-2);}
.qty span{min-width:44px;text-align:center;font-family:var(--font-exp);font-weight:800;font-size:1.1rem;color:var(--ink);}
.pd-buy{display:flex;gap:14px;margin:26px 0;flex-wrap:wrap;align-items:center;}
.pd-buy .btn{flex:1;min-width:200px;}
.cep-box{background:var(--panel);border:1px solid var(--hair);border-radius:var(--r);padding:18px 20px;display:flex;gap:12px;align-items:center;flex-wrap:wrap;}
.cep-box input{flex:1;min-width:120px;padding:12px 14px;border-radius:var(--r-sm);border:1px solid var(--hair-2);background:var(--bg);color:var(--ink);}

/* ============================================================
   CART
   ============================================================ */
.cart-page{padding:36px 0 96px;}
.cart-grid{display:grid;grid-template-columns:1fr 380px;gap:36px;align-items:start;}
.cart-items{display:flex;flex-direction:column;gap:12px;}
.cart-item{display:grid;grid-template-columns:92px 1fr auto;gap:18px;background:var(--panel);border:1px solid var(--hair);border-radius:var(--r);padding:16px;align-items:center;}
.cart-item .pack{height:108px;border-radius:var(--r-sm);}
.ci-name{font-family:var(--font-exp);font-weight:800;font-size:1.05rem;color:var(--ink);}
.ci-meta{font-size:.82rem;color:var(--muted);margin-top:4px;}
.ci-right{display:flex;flex-direction:column;align-items:flex-end;gap:12px;}
.ci-price{font-family:var(--font-display);font-size:1.5rem;white-space:nowrap;color:var(--ink);}
.qty.sm button{width:34px;height:36px;font-size:1.05rem;}
.qty.sm span{min-width:34px;font-size:.95rem;}
.ci-remove{font-size:.78rem;color:var(--muted);text-decoration:underline;text-underline-offset:2px;}
.ci-remove:hover{color:var(--red);}
.summary{background:var(--panel);border:1px solid var(--hair);border-radius:var(--r-lg);padding:28px;position:sticky;top:100px;}
.summary h3{font-family:var(--font-display);text-transform:uppercase;font-size:1.6rem;margin-bottom:20px;color:var(--ink);}
.sum-row{display:flex;justify-content:space-between;align-items:center;gap:12px;padding:10px 0;font-size:.95rem;color:var(--ink-soft);}
.sum-row>span:last-child{white-space:nowrap;text-align:right;}
.sum-row.total{border-top:1px solid var(--hair-2);margin-top:10px;padding-top:16px;font-family:var(--font-exp);font-weight:800;font-size:1.35rem;color:var(--ink);}
.ship-bar{background:var(--bg);border:1px solid var(--hair);border-radius:var(--r);padding:14px 16px;margin:16px 0;font-size:.85rem;color:var(--ink-soft);}
.ship-bar .track{height:7px;background:rgba(255,255,255,.08);border-radius:999px;overflow:hidden;margin-top:10px;}
.ship-bar .fill{height:100%;background:linear-gradient(90deg,var(--green),var(--gold));border-radius:999px;transition:width .4s;}
.ship-free{color:var(--green-deep);font-weight:800;}
.empty{text-align:center;padding:90px 20px;}
.empty .em-mark{width:92px;height:92px;border-radius:var(--r-lg);margin:0 auto 24px;background:var(--panel);border:1px solid var(--hair);display:grid;place-items:center;font-size:2.4rem;}

/* ============================================================
   CHECKOUT
   ============================================================ */
.checkout{padding:32px 0 96px;}
.stepper{display:flex;gap:8px;align-items:center;margin:0 auto 44px;max-width:620px;justify-content:center;}
.stepper .st{display:flex;align-items:center;gap:10px;}
.stepper .bub{width:30px;height:30px;border-radius:var(--r-sm);display:grid;place-items:center;font-weight:900;font-size:.82rem;background:var(--panel-2);color:var(--muted);border:1px solid var(--hair);transition:.2s;}
.stepper .st.active .bub{background:var(--red);color:#fff;border-color:var(--red);}
.stepper .st.done .bub{background:var(--green);color:#04130c;border-color:var(--green);}
.stepper .lb{font-size:.78rem;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;font-family:var(--font-exp);}
.stepper .st.active .lb,.stepper .st.done .lb{color:var(--ink);}
.stepper .bar{width:34px;height:1px;background:var(--hair-2);}
.co-grid{display:grid;grid-template-columns:1fr 360px;gap:40px;align-items:start;}
.co-card{background:var(--panel);border:1px solid var(--hair);border-radius:var(--r-lg);padding:32px;}
.co-card h3{font-family:var(--font-exp);font-weight:800;font-size:1.3rem;margin-bottom:6px;color:var(--ink);text-transform:uppercase;letter-spacing:.02em;}
.co-card .hint{color:var(--muted);font-size:.9rem;margin-bottom:26px;}
.field{margin-bottom:16px;}
.field label{display:block;font-size:.76rem;font-weight:800;margin-bottom:8px;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.04em;font-family:var(--font-exp);}
.field input,.field select{
  width:100%;padding:14px 15px;border:1px solid var(--hair-2);border-radius:var(--r-sm);background:var(--bg);color:var(--ink);
  transition:border-color .15s,box-shadow .15s;
}
.field input::placeholder{color:var(--muted);}
.field input:focus,.field select:focus{outline:none;border-color:var(--red);box-shadow:0 0 0 3px rgba(255,46,31,.18);}
.field.err input{border-color:var(--red);}
.field .msg{color:var(--red);font-size:.76rem;margin-top:6px;font-weight:700;}
.row-2{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.row-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;}
.pay-tabs{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:26px;}
.pay-tab{border:1.5px solid var(--hair);border-radius:var(--r);padding:16px;cursor:pointer;transition:.18s;display:flex;flex-direction:column;gap:8px;text-align:left;background:var(--bg);}
.pay-tab:hover{border-color:var(--hair-2);}
.pay-tab.active{border-color:var(--red);background:rgba(255,46,31,.06);}
.pay-tab b{font-family:var(--font-exp);font-weight:800;font-size:1rem;color:var(--ink);}
.pay-tab small{color:var(--muted);font-size:.8rem;}
.pay-tab .pic{width:38px;height:26px;border-radius:var(--r-xs);display:grid;place-items:center;font-family:var(--font-display);font-size:.7rem;color:#fff;}
.pix-box{text-align:center;padding:10px 0;}
.qr{width:200px;height:200px;margin:14px auto;border-radius:var(--r);background:#fff;border:1px solid var(--hair);padding:14px;}
.qr svg{width:100%;height:100%;}
.pix-spinner{width:46px;height:46px;border-radius:50%;border:4px solid var(--panel-2);border-top-color:var(--green);margin:8px auto 0;animation:spin .8s linear infinite;}
.pix-spinner.sm{width:16px;height:16px;border-width:2.5px;margin:0;display:inline-block;vertical-align:-3px;}
@keyframes spin{to{transform:rotate(360deg);}}
.pix-waiting{display:flex;align-items:center;justify-content:center;gap:9px;margin-top:16px;color:var(--green-deep);font-weight:800;font-size:.92rem;}
.pix-demo-tag{display:inline-block;margin-top:14px;font-family:var(--mono);font-size:.66rem;letter-spacing:.08em;text-transform:uppercase;color:var(--gold-deep);background:rgba(255,178,0,.12);border:1px solid rgba(255,178,0,.3);padding:6px 12px;border-radius:999px;}
.pix-code{display:flex;gap:8px;margin:16px auto;max-width:380px;}
.pix-code input{flex:1;padding:12px 14px;border:1px solid var(--hair-2);border-radius:var(--r-sm);font-family:var(--mono);font-size:.78rem;background:var(--bg);color:var(--ink);}
.card-visual{
  aspect-ratio:1.6;max-width:340px;border-radius:var(--r-lg);padding:22px;color:#fff;position:relative;overflow:hidden;
  background:linear-gradient(135deg,#23262F,#0d0e12 55%),linear-gradient(135deg,var(--red),transparent);margin-bottom:20px;box-shadow:var(--shadow);border:1px solid var(--hair);
}
.card-visual::after{content:"";position:absolute;right:-30%;top:-60%;width:90%;height:200%;background:radial-gradient(circle,rgba(255,46,31,.3),transparent 60%);}
.card-visual .chip{width:42px;height:32px;border-radius:6px;background:linear-gradient(135deg,#ffe08a,#d9a400);margin-bottom:26px;position:relative;z-index:1;}
.card-visual .cnum{font-family:var(--mono);font-size:1.15rem;letter-spacing:.12em;position:relative;z-index:1;}
.card-visual .crow{display:flex;justify-content:space-between;margin-top:18px;font-size:.78rem;text-transform:uppercase;letter-spacing:.08em;position:relative;z-index:1;}
.card-visual .crow small{opacity:.55;font-size:.58rem;display:block;}
.success{text-align:center;max-width:560px;margin:20px auto;background:var(--panel);border:1px solid var(--hair);border-radius:var(--r-xl);padding:56px 40px;}
.success .check{width:92px;height:92px;border-radius:50%;background:var(--green);display:grid;place-items:center;margin:0 auto 26px;animation:pop .4s cubic-bezier(.2,1.4,.4,1);box-shadow:0 0 50px -8px rgba(25,195,125,.5);}
.success .check svg{width:46px;height:46px;color:#04130c;}
@keyframes pop{from{transform:scale(0);}to{transform:scale(1);}}
.success h2{font-family:var(--font-display);text-transform:uppercase;font-size:2.6rem;margin-bottom:12px;color:var(--ink);}
.order-tag{display:inline-block;font-family:var(--mono);background:var(--bg);border:1px solid var(--hair);padding:8px 16px;border-radius:var(--r-sm);font-size:.85rem;margin:14px 0 22px;letter-spacing:.05em;color:var(--gold);}
.mini-summary{background:var(--bg);border:1px solid var(--hair);border-radius:var(--r);padding:18px;text-align:left;margin:24px 0;}
.mini-summary .sum-row{font-size:.9rem;padding:6px 0;}

/* ============================================================
   MOBILE
   ============================================================ */
@media (max-width:980px){
  .hero-inner{grid-template-columns:1fr;gap:10px;padding:48px 0 58px;}
  .hero-art{height:300px;order:-1;}
  .fp1{width:160px;height:214px;} .fp2{width:140px;height:188px;} .fp3{width:118px;height:158px;}
  .pd-grid{grid-template-columns:1fr;gap:32px;}
  .pd-gallery{position:static;}
  .pd-hero-pack{height:380px;}
  .cart-grid{grid-template-columns:1fr;}
  .summary{position:static;}
  .co-grid{grid-template-columns:1fr;}
  .prod-grid,.prod-grid.cols-3{grid-template-columns:repeat(2,1fr);}
  .trust-row{grid-template-columns:1fr 1fr;}
  .steps{grid-template-columns:1fr;}
  .footer-top{grid-template-columns:1fr 1fr;}
}
@media (max-width:680px){
  .nav{display:none;}
  .menu-toggle{display:flex;}
  .header-row{height:64px;gap:12px;}
  .logo-txt small{display:none;}
  .cart-btn .cart-label{display:none;}
  .hero-stats{gap:0;flex-wrap:wrap;}
  .hero-stats .st{padding-right:20px;margin-right:20px;}
  .prod-grid,.prod-grid.cols-3{grid-template-columns:1fr 1fr;gap:12px;}
  .card .pack{height:178px;}
  .pd-features{grid-template-columns:1fr;}
  .trust-row{grid-template-columns:1fr;}
  .footer-top{grid-template-columns:1fr;}
  .section{padding:56px 0;}
  .wrap{padding:0 18px;}
  .row-2,.row-3{grid-template-columns:1fr;}
  .cart-item{grid-template-columns:70px 1fr;}
  .cart-item .ci-right{grid-column:1/-1;flex-direction:row;justify-content:space-between;align-items:center;}
}

/* Mobile drawer */
.drawer{position:fixed;inset:0;z-index:90;display:none;}
.drawer.open{display:block;}
.drawer-bg{position:absolute;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(4px);}
.drawer-panel{position:absolute;top:0;right:0;bottom:0;width:min(320px,84vw);background:var(--panel);border-left:1px solid var(--hair);padding:24px;display:flex;flex-direction:column;gap:6px;box-shadow:var(--shadow-lg);animation:slideIn .25s ease;}
@keyframes slideIn{from{transform:translateX(100%);}to{transform:translateX(0);}}
.drawer-panel a{padding:16px;border-radius:var(--r-sm);font-family:var(--font-exp);font-weight:800;font-size:1.05rem;text-transform:uppercase;letter-spacing:.03em;color:var(--ink);}
.drawer-panel a:hover{background:var(--panel-2);}
.drawer-close{align-self:flex-end;width:44px;height:44px;border-radius:var(--r-sm);background:var(--panel-2);display:grid;place-items:center;font-size:1.4rem;margin-bottom:10px;color:var(--ink);}
</style>
</head>
